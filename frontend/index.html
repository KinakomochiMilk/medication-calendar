<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お薬カレンダー印刷システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 480px;
            width: 100%;
            position: relative;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #4a5568;
        }
        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
        }
        .checkbox-group {
            display: flex;
            gap: 15px;
            background: #edf2f7;
            padding: 12px;
            border-radius: 6px;
            justify-content: space-around;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #3182ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 15px;
            font-weight: bold;
            color: #2d3748;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">
            📋 カレンダーPDFを作成中...<br>
            <span style="font-size: 12px; color: #718096; font-weight: normal;">
                (初回やしばらく時間が空いた場合は、サーバー起動のため約1分かかります)
            </span>
        </div>
    </div>

    <h1>📋 お薬カレンダー PDF生成</h1>
    
    <div class="form-group">
        <label for="startDate">開始日</label>
        <input type="date" id="startDate">
    </div>
    
    <div class="form-group">
        <label for="endDate">終了日</label>
        <input type="date" id="endDate">
    </div>

    <div class="form-group">
        <label for="customText">服薬タイミング（例：ご飯を食べたあと）</label>
        <input type="text" id="customText" placeholder="空白の場合は枠が表示されません">
    </div>

    <div class="form-group">
        <label>印刷する時間帯（複数選択可）</label>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="checkAsa" checked>朝</label>
            <label class="checkbox-label"><input type="checkbox" id="checkHiru" checked>昼</label>
            <label class="checkbox-label"><input type="checkbox" id="checkYoru" checked>夜</label>
        </div>
    </div>
    
    <button onclick="generatePDF()">PDFをダウンロードする</button>
</div>

<script>
    const RENDER_BACKEND_URL = "https://medication-calendar.onrender.com";

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;
        document.getElementById('customText').value = "ご飯を食べたあと";
    };

    async function generatePDF() {
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        const customText = document.getElementById('customText').value.trim();
        
        const times = [];
        if (document.getElementById('checkAsa').checked) times.push("朝");
        if (document.getElementById('checkHiru').checked) times.push("昼");
        if (document.getElementById('checkYoru').checked) times.push("夜");

        if (!startVal || !endVal || times.length === 0) {
            alert("入力項目を確認してください。");
            return;
        }

        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';

        try {
            const response = await fetch(`${RENDER_BACKEND_URL}/generate-pdf`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    start_date: startVal,
                    end_date: endVal,
                    custom_text: customText,
                    times: times
                })
            });

            if (!response.ok) throw new Error("サーバー側でエラーが発生しました。");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `calendar_${startVal}_to_${endVal}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } catch (error) {
            console.error(error);
            alert("PDFの取得に失敗しました。Renderサーバーが起動中か確認してください。");
        } finally {
            overlay.style.display = 'none';
        }
    }
</script>
</body>
</html>
